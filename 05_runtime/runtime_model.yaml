# runtime_model.yaml
# Structural model of the Lattice runtime

runtime_id: "LATTICE-RUNTIME"
version: "1.0.0"
status: "active"

components:
  scheduler: "governed task scheduler"
  execution_engine: "reversible execution engine"
  drift_monitor: "drift detection and classification"
  reversibility_engine: "rollback and undo system"
  envelope: "runtime boundary enforcement"

governance:
  protocols:
    - "Ω-13"
    - "Ω-14"
    - "AMP"
  invariants:
    - "lineage_mandatory"
    - "drift_detectability"
    - "reversibility_preferred"
    - "boundary_integrity"

integrations:
  vara: "signal decomposition and drift mapping"
  stumpy: "structural coherence and constraint mapping"

lineage:
  required: true
  sinks:
    - "00_governance/governance_lineage/protocols.lineage"
    - "05_runtime/vault/lineage/"
